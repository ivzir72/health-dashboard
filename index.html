<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Health Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: #fff;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: #020617;
  padding: 20px;
  height: 100vh;
  border-right: 1px solid #1e293b;
}

.sidebar h2 {
  font-size: 18px;
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  padding: 10px;
  margin: 8px 0;
  color: #94a3b8;
  text-decoration: none;
  border-radius: 8px;
}

.sidebar a:hover {
  background: #1e293b;
  color: #fff;
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.card {
  background: linear-gradient(135deg, #1e293b, #020617);
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.4);
}

.card h3 {
  font-size: 14px;
  color: #94a3b8;
}

.card p {
  font-size: 26px;
  margin: 10px 0;
}

/* Progress bar */
.progress {
  background: #1e293b;
  border-radius: 10px;
  height: 8px;
  overflow: hidden;
}

.progress-bar {
  height: 8px;
  background: linear-gradient(90deg, #22c55e, #4ade80);
}

/* Chart */
.chart-box {
  margin-top: 25px;
  background: #020617;
  padding: 20px;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>💪 Dashboard</h2>
  <a href="#">Overview</a>
  <a href="#">Progress</a>
  <a href="#">Nutrition</a>
  <a href="#">Workout</a>
</div>

<!-- Main Content -->
<div class="main">

<div class="header">
  <h1>🔥 My Fitness Tracker</h1>
  <p id="date"></p>
</div>

<div class="cards">

  <div class="card">
    <h3>Weight</h3>
    <p id="weight">--</p>
  </div>

  <div class="card">
    <h3>Calories</h3>
    <p id="calories">--</p>
    <div class="progress">
      <div id="calorieBar" class="progress-bar"></div>
    </div>
  </div>

  <div class="card">
    <h3>Steps</h3>
    <p id="steps">--</p>
    <div class="progress">
      <div id="stepBar" class="progress-bar"></div>
    </div>
  </div>

  <div class="card">
    <h3>Workout</h3>
    <p id="workout">--</p>
  </div>

</div>

<div class="chart-box">
  <h3>📉 Weight Progress</h3>
  <canvas id="weightChart"></canvas>
</div>

</div>

<script>
// Date
document.getElementById("date").innerText = new Date().toDateString();

// Fetch data
fetch('data.json')
.then(res => res.json())
.then(data => {

  document.getElementById("weight").innerText = data.latest.weight + " kg";
  document.getElementById("calories").innerText = data.latest.calories + " kcal";
  document.getElementById("steps").innerText = data.latest.steps;
  document.getElementById("workout").innerText = data.latest.workout;

  // Progress bars
  document.getElementById("calorieBar").style.width = (data.latest.calories / 2000 * 100) + "%";
  document.getElementById("stepBar").style.width = (data.latest.steps / 10000 * 100) + "%";

  // Chart
  new Chart(document.getElementById('weightChart'), {
    type: 'line',
    data: {
      labels: data.history.map(d => d.date),
      datasets: [{
        data: data.history.map(d => d.weight),
        borderWidth: 3,
        tension: 0.4
      }]
    },
    options: {
      plugins: { legend: { display: false } }
    }
  });

});
</script>

</body>
</html>
